<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Dynamic SEO Metadata -->
<title><%= seo.metaTitle %></title>
<meta name="description" content="<%= seo.metaDescription %>">
<meta name="keywords" content="<%= seo.keywords || 'Sankalp Digital Pathshala, Salemgarh, Tamkuhi, Kushinagar, UP Board, Coding, Robotics, JEE, NEET' %>">
<link rel="canonical" href="<%= seo.canonicalUrl %>">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="<%= seo.canonicalUrl %>">
<meta property="og:title" content="<%= seo.ogTitle || seo.metaTitle %>">
<meta property="og:description" content="<%= seo.ogDescription || seo.metaDescription %>">
<meta property="og:image" content="<%= seo.ogImage || '/assets/images/placeholder-campus.webp' %>">

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="<%= seo.canonicalUrl %>">
<meta property="twitter:title" content="<%= seo.ogTitle || seo.metaTitle %>">
<meta property="twitter:description" content="<%= seo.ogDescription || seo.metaDescription %>">
<meta property="twitter:image" content="<%= seo.ogImage || '/assets/images/placeholder-campus.webp' %>">

<!-- Structured JSON-LD Schemas -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "EducationalOrganization",
  "name": "Sankalp Digital Pathshala",
  "url": "https://www.sankalpdigitalpathshala.online",
  "logo": "https://images.unsplash.com/photo-1546410531-bb4caa6b424d?auto=format&fit=crop&w=120&q=80",
  "description": "India's Future-Ready Education Ecosystem combining academic boards preparation, JEE, NEET, Artificial Intelligence, and Robotics.",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "Salemgarh, Tamkuhi",
    "addressLocality": "Kushinagar",
    "addressRegion": "Uttar Pradesh",
    "postalCode": "274407",
    "addressCountry": "IN"
  },
  "contactPoint": {
    "@type": "ContactPoint",
    "telephone": "+91-9453961105",
    "contactType": "admissions",
    "areaServed": "IN",
    "availableLanguage": ["Hindi", "English"]
  }
}
</script>

<!-- Global CSS files -->
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/responsive.css">

<!-- Third Party CSS CDNs -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
