<!DOCTYPE html>
<html lang="en">
<head>
  <%- include('../components/head.html') %>
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body style="background: var(--bg-primary);">

  <div class="admin-dashboard-wrap">
    <!-- Shared Admin Sidebar -->
    <%- include('../components/admin-sidebar.html') %>

    <!-- Main Workspace Area -->
    <div class="admin-main-content">
      <div class="admin-header">
        <div>
          <h2 style="font-size: 2rem;">Course Programs Manager</h2>
          <span style="color:var(--text-muted); font-size:0.9rem;">Add, update, or remove courses from the public academic catalog.</span>
        </div>
      </div>

      <div class="crud-manager-layout">
        <!-- 1. Catalog List -->
        <div class="table-card">
          <h3 style="margin-bottom:1rem">Active Course Programs</h3>
          <div id="adminProgramManager">
            <i class="fas fa-spinner fa-spin" style="color:var(--accent-cyan)"></i> Loading course list...
          </div>
        </div>

        <!-- 2. Form to Add New Program -->
        <div class="roadmap-form" style="margin:0; width:100%">
          <h3 style="color:#fff; font-size:1.2rem; margin-bottom:1.5rem">Publish New Program</h3>
          
          <form id="newProgramForm">
            <div class="form-group">
              <label>Course Title</label>
              <input type="text" id="progTitle" required placeholder="e.g. Android Development Foundation">
            </div>
            
            <div class="form-group">
              <label>Course Category</label>
              <select id="progCategory">
                <option value="Academic">Academic Excellence</option>
                <option value="Future Skills">Future Skills</option>
              </select>
            </div>

            <div class="form-group">
              <label>Duration</label>
              <input type="text" id="progDuration" required placeholder="e.g. 6 Months, 1 Year">
            </div>

            <div class="form-group">
              <label>Fee Structure</label>
              <input type="text" id="progFees" required placeholder="e.g. ₹5,000 / one-time">
            </div>

            <div class="form-group">
              <label>Course Description</label>
              <textarea id="progDesc" rows="3" required placeholder="Detailed objectives..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-glow" style="width: 100%; margin-top: 1rem;">Publish Course</button>
          </form>
        </div>
      </div>

    </div>
  </div>

  <!-- Include Global Scripts -->
  <%- include('../components/scripts.html') %>
  <script src="/js/dashboard.js"></script>

</body>
</html>
